name: 🎨 Deploy Frontend to Hosting

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'backend/**'
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Build & Deploy Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔍 Debug - Check files before build
        run: |
          echo "=== Checking project files ==="
          ls -la
          echo ""
          echo "=== Checking vite.config.ts ==="
          cat vite.config.ts
          echo ""
          echo "=== Checking package.json build script ==="
          cat package.json | grep -A 5 '"scripts"'

      - name: 🏗️ Build production
        run: |
          echo "=== Starting Vite build ==="
          npm run build
        env:
          NODE_ENV: production

      - name: 🔍 Debug - List build output
        run: |
          echo "=== Checking build output ==="
          ls -la
          echo ""
          if [ -d "dist" ]; then
            echo "✅ dist/ folder exists"
            echo "=== dist/ contents ==="
            ls -la dist/
            echo ""
            if [ -f "dist/index.html" ]; then
              echo "✅ dist/index.html exists"
            else
              echo "❌ dist/index.html NOT found!"
            fi
          else
            echo "❌ dist/ folder NOT found!"
            echo ""
            echo "=== Checking for other build outputs ==="
            find . -name "index.html" -type f 2>/dev/null || echo "No index.html found anywhere"
            exit 1
          fi

      - name: 📤 Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*