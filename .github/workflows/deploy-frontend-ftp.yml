name: 🎨 Deploy Frontend to Hosting

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'backend/**'
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Build & Deploy Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔍 Debug - Before build
        run: |
          echo "=== Project structure ==="
          ls -la
          echo ""
          echo "=== Vite config ==="
          cat vite.config.ts
          echo ""
          echo "=== Package.json scripts ==="
          cat package.json | grep -A 10 '"scripts"'

      - name: 🏗️ Build production
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🔍 Debug - After build
        run: |
          echo "=== Checking build output ==="
          ls -la
          echo ""
          if [ -d "dist" ]; then
            echo "✅ dist/ folder exists"
            ls -laR dist/
          elif [ -d "build" ]; then
            echo "⚠️ build/ folder found instead of dist/"
            ls -laR build/
            echo "Moving build/ to dist/"
            mv build dist
          else
            echo "❌ No build output found!"
            echo "Searching for index.html..."
            find . -name "index.html" -type f 2>/dev/null || echo "No index.html found"
            exit 1
          fi

      - name: 📤 Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
