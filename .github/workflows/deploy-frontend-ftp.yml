name: 🎨 Deploy Frontend to Hosting

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'backend/**'
      - '*.md'
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: 🚀 Deploy Frontend to Hosting
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build production
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3001/api' }}
        run: npm run build

      - name: 📤 Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/node_modules/**
            **/.env
            backend/**

      - name: 🎉 Success
        run: |
          echo "════════════════════════════════════════"
          echo "✅ Frontend deployed successfully!"
          echo "════════════════════════════════════════"
          echo "🌐 Website: https://yourdomain.com"
          echo "📁 FTP Server: ${{ secrets.FTP_SERVER }}"
          echo "📂 Directory: ${{ secrets.FTP_SERVER_DIR }}"
          echo "⏰ Time: $(date)"
          echo "════════════════════════════════════════"
